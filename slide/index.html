<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPoint - Nhóm 1 (Cogitox-SDK)</title>
    <!-- Font Awesome & Google Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .presentation-container {
            width: 1300px;
            max-width: 100%;
            background: #0b0b15;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            padding: 20px;
            transition: all 0.2s;
        }

        /* vùng hiển thị slide */
        .slide-viewer {
            background: #1e1e2a;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            aspect-ratio: 16 / 9;
            width: 100%;
            position: relative;
        }

        .slide-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: white;
        }

        /* thanh điều khiển */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 22px;
            padding: 0 8px;
            color: #a9b7d4;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: #2f2f41;
            border: none;
            color: #d0d9f0;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            border: 1px solid #40405c;
        }

        .nav-btn:hover:not(:disabled) {
            background: #3e3e5e;
            color: white;
            border-color: #6d6d9c;
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .slide-indicator {
            background: #2f2f41;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            border: 1px solid #40405c;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .slide-indicator i {
            margin-right: 8px;
            color: #7aa2f7;
        }

        .progress-bar {
            flex: 2;
            min-width: 160px;
            height: 8px;
            background: #2f2f41;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7aa2f7, #bb9af7);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .slide-title {
            font-size: 1rem;
            font-weight: 500;
            background: #2f2f41;
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid #40405c;
            color: #c8d3f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }

        .slide-title i {
            margin-right: 8px;
            color: #f39c12;
        }

        /* nút fullscreen */
        .fullscreen-btn {
            background: #2f2f41;
            border: 1px solid #40405c;
            color: #d0d9f0;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .fullscreen-btn:hover {
            background: #3e3e5e;
            color: white;
            border-color: #6d6d9c;
            transform: scale(1.05);
        }

        /* responsive */
        @media (max-width: 850px) {
            .control-bar {
                justify-content: center;
            }
            .slide-title {
                max-width: 100%;
                width: 100%;
                text-align: center;
                order: 4;
            }
        }
    </style>
</head>
<body>
    <div class="presentation-container" id="presentationContainer">
        <!-- khung hiển thị slide -->
        <div class="slide-viewer" id="slideViewer">
            <iframe class="slide-frame" id="slideFrame" src="cau1.html" title="Slide"></iframe>
        </div>

        <!-- thanh điều khiển -->
        <div class="control-bar">
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-chevron-left"></i></button>
                <button class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="slide-indicator">
                <i class="fas fa-image"></i>
                <span id="currentSlide">1</span> / <span id="totalSlides">3</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 33.3%;"></div>
            </div>

            <div class="slide-title" id="slideTitle">
                <i class="fas fa-gem"></i>
                <span id="slideName">Câu 1: Kiến thức nghề</span>
            </div>

            <!-- nút fullscreen -->
            <button class="fullscreen-btn" id="fullscreenBtn" title="Toàn màn hình">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </div>

    <script>
        // Danh sách các slide (các file html)
        const slides = [
            { file: 'cau1.html', name: 'Câu 1' },
            { file: 'cau2.html', name: 'Câu 2' },
            { file: 'cau3.html', name: 'Câu 3' }
        ];

        let currentIndex = 0; // bắt đầu từ slide 0
        const slideFrame = document.getElementById('slideFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentSpan = document.getElementById('currentSlide');
        const totalSpan = document.getElementById('totalSlides');
        const progressFill = document.getElementById('progressFill');
        const slideNameSpan = document.getElementById('slideName');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const container = document.getElementById('presentationContainer');
        const slideViewer = document.getElementById('slideViewer');

        // Cập nhật tổng số slide
        totalSpan.textContent = slides.length;

        // Hàm tải slide theo index
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;

            // Đổi src của iframe
            slideFrame.src = slides[index].file;

            // Cập nhật chỉ số hiển thị
            currentSpan.textContent = index + 1;

            // Cập nhật tên slide
            slideNameSpan.textContent = slides[index].name;

            // Cập nhật thanh tiến trình
            const progressPercent = ((index + 1) / slides.length) * 100;
            progressFill.style.width = progressPercent + '%';

            // Bật/tắt nút prev/next
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === slides.length - 1);
        }

        // Sự kiện nút Previous
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadSlide(currentIndex);
            }
        });

        // Sự kiện nút Next
        nextBtn.addEventListener('click', () => {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                loadSlide(currentIndex);
            }
        });

        // Tải slide đầu tiên
        loadSlide(0);

        // Điều khiển bằng phím mũi tên trái/phải
        window.addEventListener('keydown', (e) => {
            // Chỉ xử lý khi không phải đang gõ trong ô input/textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'ArrowLeft') {
                e.preventDefault(); // tránh cuộn trang
                if (!prevBtn.disabled) {
                    prevBtn.click();
                }
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (!nextBtn.disabled) {
                    nextBtn.click();
                }
            }
        });

        // Chức năng toàn màn hình
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                // Vào fullscreen (toàn bộ container)
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) { // Safari
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) { // IE/Edge
                    container.msRequestFullscreen();
                }
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                // Thoát fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }

        // Lắng nghe sự kiện thay đổi fullscreen để cập nhật icon
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
        document.addEventListener('msfullscreenchange', updateFullscreenIcon);

        function updateFullscreenIcon() {
            if (document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }

        // Tối ưu: focus vào container để bắt phím tốt hơn (không bắt buộc)
        container.focus();
    </script>
</body>
</html>
